name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify Docker (integration tests)
        run: docker info

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Unit tests
        run: dotnet test tests/FlowBoard.UnitTests --no-build -c Release --verbosity normal

      - name: Integration tests (TestContainers + SQL Server)
        run: dotnet test tests/FlowBoard.IntegrationTests --no-build -c Release --verbosity normal
