# SQL Server for local integration tests (optional — faster reruns than TestContainers).
# Start:  pwsh scripts/run-integration-tests.ps1 -UseCompose
# Default: TestContainers spins up an isolated container per test run (no compose needed).
services:
  sqlserver-integration:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: flowboard-sqlserver-integration
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-FlowBoard_Integration_Test1!}"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -No
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: "no"
